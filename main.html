<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Utstyr</title>

    <link rel="stylesheet" href="style.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="top-row">
    <h1>Utstyr</h1>
    <button id="themeToggleBtn" class="theme-btn">Mørk modus</button>
</div>

<h2>Legg til nytt utstyr</h2>
<input id="equipName" placeholder="Navn på utstyr">
<input id="equipNumber" placeholder="Utstyrsnummer (f.eks APL-001)">
<button id="addBtn">Legg til</button>

<hr>

<div class="item-row header-row">
    <div class="cell">Navn</div>
    <div class="cell">Utstyrsnummer</div>
    <div class="cell">Lånt av / når</div>
    <div class="cell">Status</div>
</div>

<div class="grid" id="equipmentGrid"></div>

<script src="script.js"></script>
</body>
</html>
