<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Innlogging</title>

    <!--
        Denne filen er innloggingssiden for netsiden.
        - Felt: `username` og `password` for autentisering
        - Knapper: `loginBtn` og `registerBtn` håndteres i `script.js`
        - Tema-knapp: `themeToggleBtn` bytter lys/mørk modus
    -->

    <!-- Gjør siden mobilvennlig ved å skalere etter skjermbredde -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h2>Innlogging</h2>

<!-- Brukerens e-post / brukernavn -->
<input type="text" id="username" placeholder="Brukernavn">
<br><br>

<!-- Brukerens passord -->
<input type="password" id="password" placeholder="Passord">
<br><br>

<!-- Knapper for innlogging og registrering -->
<button id="loginBtn">Logg inn</button>
<button id="registerBtn">Registrer</button>

<!-- Viser eventuelle feilmeldinger til brukeren -->
<p id="error"></p>

<!-- Supabase JavaScript-bibliotek for autentisering og database -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Egen JavaScript som håndterer logikk og oppdaterer siden -->
<script src="script.js"></script>

</body>
</html>
